name: Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
          - 8080:8080
          - 8222:8222
        options: >-
          --health-cmd "nc -z localhost 4222 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          -v ${{ github.workspace }}/nats-ws.conf:/nats-server.conf:ro
        command:
          - nats-server
          - -c
          - /nats-server.conf

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-
            ${{ runner.os }}-uv-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Run all tests (core, NATS, and API-dependent)
        env:
          # Override NATS_SERVERS for GitHub Actions (conftest.py will use this if set)
          NATS_SERVERS: "nats://localhost:4222"
          # Set API key from GitHub Secrets (takes priority over .env)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # List all tests for debugging
          pytest -v tests/ --collect-only -q 2>&1 | tail -20

          # Run all tests in a single pytest invocation with junit-xml report
          pytest -v tests/ \
            --tb=short \
            --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 5
