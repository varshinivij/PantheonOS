# Pantheon Chatroom Configuration - Unified Format
#
# All chatrooms use unified configuration format:
# - agents_config (required): Dict with agent definitions, must have 'triage'
# - sub_agents (optional): Specification to load agents from agents.yaml library
#
# Feature Enablement (automatic, based on configuration):
# - Agent Transfer: When agents_config has multiple agents (len > 1)
# - Sub-Agent Discovery: When sub_agents spec is non-empty
#
# Sub-agents spec can be:
# - "all": Load all agents from agents.yaml
# - [list]: Load specific agents from library
# - None or []: No library agents (default)

chatrooms:
  # ============================================================================
  # Default: Simple coordinator with all library agents (recommended)
  # ============================================================================

  default:
    id: default
    name: Default Chatroom
    description: |
      The default chatroom with Team Coordinator that can delegates to all
      available agents for comprehensive task handling.
    icon: 🏠
    category: general
    version: 2.0.0

    agents_config:
      triage:
        name: Team Coordinator
        instructions: |
          You are a helpful AI assistant.
          Handle a variety of tasks with basic tooling support.
          Keep responses concise and focused.
          For basic tasks, handle them with basic tooling support.
          For specialized tasks, consider delegating to specialized agents.
        model: openai/gpt-4o-mini
        icon: 🤖
        toolsets:
          - file_manager
          - shell
          - web
          - integrated_notebook

    # Optional: Load all agents from agents.yaml
    sub_agents: "all"

  # ============================================================================
  # Specialized Teams - Specific agents
  # ============================================================================

  # Data Science Team
  data_science_team:
    id: data_science_team
    name: Data Science Team
    description: |
      Specialized team for data science and analytics workflows.
      Main coordinator delegates to data analysis specialists.
    icon: 📊
    category: data_science
    version: 2.0.0

    agents_config:
      triage:
        name: Data Science Lead
        instructions: |
          You are the Data Science Lead coordinating the analysis team.
          Your team includes:
          - Data Analyst: EDA, visualization, statistical analysis
          - ML Engineer: Model development and training
          - Data Scientist Assistant: Notebook-based interactive analysis

          Lead the team through data analysis projects step by step.
        model: openai/gpt-4o-mini
        icon: 👨‍💼

    sub_agents:
      - data_analyst
      - ml_engineer
      - data_science_assistant
      - statistician

  # Developer Team
  developer_team:
    id: developer_team
    name: Developer Team
    description: |
      Engineering team for software development, automation, and infrastructure.
      Coordinates Python, Frontend, and Data Engineering specialists.
    icon: 👨‍💻
    category: engineering
    version: 2.0.0

    agents_config:
      triage:
        name: Engineering Manager
        instructions: |
          You are the Engineering Manager leading a development team.
          Team members available:
          - Python Developer: Backend, APIs, automation
          - Frontend Developer: Web UIs, responsive design
          - Data Engineer: Pipelines, ETL, infrastructure

          Coordinate technical tasks and ensure code quality.
        model: openai/gpt-4o-mini
        icon: 👔

    sub_agents:
      - python_dev
      - frontend_dev
      - data_engineer

  # Research Team
  research_team:
    id: research_team
    name: Research & Content Team
    description: |
      Team for research, web content analysis, and information synthesis.
      Coordinates researcher, scraper, and content analyst specialists.
    icon: 🔍
    category: research
    version: 2.0.0

    agents_config:
      triage:
        name: Research Director
        instructions: |
          You are the Research Director managing content and information discovery.
          Your team includes:
          - Web Researcher: Finding and evaluating sources
          - Data Scraper: Extracting structured data from web
          - Content Analyst: Analyzing and summarizing content

          Lead research initiatives and ensure information quality.
        model: openai/gpt-4o-mini
        icon: 📚

    sub_agents:
      - researcher
      - scraper
      - content_analyst
      - web_search_agent


  # ============================================================================
  # Hybrid Example - Inline agents + Library sub-agents
  # ============================================================================

  hybrid_team:
    id: hybrid_team
    name: Hybrid Team
    description: |
      Demonstrates unified architecture supporting both features:
      - Agent Transfer: Multiple agents defined inline
      - Sub-Agent Discovery: Can delegate to library agents
      This shows how both mechanisms can coexist in one team.
    icon: ⚙️
    category: advanced
    version: 2.0.0

    agents_config:
      triage:
        name: Main Coordinator
        instructions: |
          You are the Main Coordinator managing a hybrid team.
          You can:
          0. Handle basic tasks with basic tooling support
          1. Transfer to other agents
          2. Delegate to sub-agents

          Choose the right team member based on task requirements.
        model: openai/gpt-4o-mini
        icon: 🎯

      # Inline specialist agents (for transfer)
      specialist_analyst:
        name: Specialist Analyst
        instructions: |
          You are a specialist analyst focused on detailed analysis.
        model: openai/gpt-4o-mini
        icon: 📊
        toolsets:
          - python_interpreter
          - file_manager

      specialist_engineer:
        name: Specialist Engineer
        instructions: |
          You are a specialist engineer focused on implementation.
        model: openai/gpt-4o-mini
        icon: 🔧
        toolsets:
          - python_interpreter
          - file_manager

    # Can also delegate to library agents
    sub_agents:
      - data_analyst
      - python_dev
      - researcher
