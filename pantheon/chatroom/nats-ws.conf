# NATS Server Configuration with WebSocket Support

# Standard NATS port
port: 4222

# WebSocket configuration
websocket {
  host: 0.0.0.0
  port: 8080
  no_tls: true
  same_origin: false
  handshake_timeout: "2s"
  compression: true
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Server Configuration (Local Development)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

listen: 0.0.0.0:4222
server_name: pantheon-nats-dev

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Performance and Connection Limits
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

max_connections: 1000

# NATS payload size limit
# Default: 1MB
# Current: 10MB (supports ~2000 chat messages)
# Reason: Resolve chat message payload overflow issue
max_payload: 100MB

# Pending messages queue size (should be 6-10x of max_payload)
max_pending: 640MB

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Connection and Timeout Settings
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Heartbeat ping interval
ping_interval: 120s

# Maximum ping retries before disconnection
ping_max: 3

# Message write timeout
write_deadline: 10s

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JetStream Support
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jetstream {
  store_dir: "./jetstream_storage"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Monitoring
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

http_port: 8222

# Logging configuration
#log_file: "./nats-server.log"
logtime: true
debug: false
trace: false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Clustering (Optional)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Uncomment to enable clustering
# cluster {
#   name: pantheon-cluster
#   listen: localhost:6222
#   routes = [
#     "nats://other-node:6222"
#   ]
# }

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Authentication (Optional)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Uncomment to enable authentication
# authorization {
#   users = [
#     {user: "pantheon", password: "password", permissions: {publish: "*", subscribe: "*"}}
#   ]
# }
