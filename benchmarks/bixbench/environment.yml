# BixBench Environment - Replicating futurehouse/bixbench:aviary-notebook-env
# 
# Usage:
#   conda env create -f environment.yml
#   conda activate bixbench
#
# WARNING: Version coordination between R/Python/Bioconductor is challenging.
# If you encounter conflicts, try relaxing version pins or use Docker instead.

name: bixbench
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ============================================================
  # Core Python Environment
  # ============================================================
  - python=3.12
  - ipykernel=6.29.5
  - jupyter=1.0.0
  - nbconvert=7.16.4

  # ============================================================
  # R Language Environment
  # ============================================================
  - r-base=4.3.3
  - r-recommended=4.3
  - r-irkernel=1.3.2

  # R Core Packages
  - r-tidyverse=2.0.0
  - r-devtools=2.4.5
  - r-data.table=1.15.4
  - r-matrix=1.6_5
  - r-readxl=1.4.3
  - r-broom=1.0.7
  - r-janitor=2.2.1

  # R Visualization
  - r-ggpubr=0.6.0
  - r-ggrepel=0.9.6
  - r-ggnewscale=0.5.0
  - r-ggvenn=0.1.10
  - r-pheatmap=1.0.12
  - r-viridis=0.6.5
  - r-rcolorbrewer=1.1_3
  - r-factoextra=1.0.7
  - r-factominer=2.11
  - r-reshape=0.8.9

  # R Statistics
  - r-rstatix=0.7.2
  - r-multcomp=1.4_26
  - r-enrichr=3.2

  # ============================================================
  # Bioconductor Packages (Critical for RNA-seq analysis)
  # ============================================================
  - bioconductor-deseq2=1.42.0
  - bioconductor-clusterprofiler=4.10.0
  - bioconductor-enhancedvolcano=1.20.0
  - bioconductor-org.hs.eg.db=3.18.0
  - bioconductor-genomicranges=1.54.1
  - bioconductor-summarizedexperiment=1.32.0
  - bioconductor-apeglm=1.24.0

  # ============================================================
  # Python Data Science & ML
  # ============================================================
  - pandas=2.2.3
  - numpy=2.0.2
  - scipy=1.14.1
  - scikit-learn=1.6.0
  - statsmodels=0.14.4
  - optuna=4.1.0
  - imbalanced-learn=0.13.0

  # Deep Learning
  - pytorch=2.5.1
  - keras=3.7.0

  # ============================================================
  # Python Visualization
  # ============================================================
  - matplotlib=3.10.0
  - matplotlib-venn=1.1.1
  - seaborn=0.13.2
  - plotly=5.24.1

  # ============================================================
  # Python Bioinformatics
  # ============================================================
  - scanpy=1.10.4
  - anndata=0.11.1
  - pydeseq2=0.4.12
  - gseapy=1.1.4
  - biopython=1.84
  - mygene=3.2.2
  - biokit=0.5.0
  - ete3=3.1.3
  - umap-learn=0.5.7

  # Python-R Bridge
  - rpy2=3.5.11

  # File I/O
  - openpyxl=3.1.5

  # ============================================================
  # Bioinformatics CLI Tools
  # ============================================================
  - blast=2.16.0
  - fastqc=0.12.1
  - mafft=7.526
  - iqtree=2.3.6
  - spades=4.0.0
  - trim-galore=0.6.10
  - clipkit=2.3.0
  - phykit=2.0.1
  - metaeuk=7.bba0d80
  - perl=5.32.1

  # SQLite (required by blast)
  - sqlite>=3.49.1
